<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project 02 - Driver-Based Forecasting Power BI Dashboard Mockup</title>
  <style>
    body { margin: 0; background: #f4f6f8; color: #1c2530; font-family: Segoe UI, Arial, sans-serif; }

    h1 { margin: 0; font-size: 24px; }
    p { color: #667085; margin: 8px 0 0; }
    main { padding: 24px 36px 42px; }
    .page { background: #fff; border: 1px solid #dce2ea; border-radius: 8px; padding: 18px; margin-bottom: 26px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    img { width: 100%; height: auto; display: block; border: 1px solid #e8edf3; }

<body>
  <header>
    <h1>Project 02 - Driver-Based Forecasting & Scenario Planning</h1>
    <p>Power BI-style dashboard mockup generated from the prepared model data.</p>
  </header>
  <main>
    
      <section class="page">
        <h2>Executive Overview</h2>
        <img src="../screenshots/powerbi_mockup/01_powerbi_executive_overview.png" alt="Executive Overview">
      </section>
      <section class="page">
        <h2>Revenue & Cost Drivers</h2>
        <img src="../screenshots/powerbi_mockup/02_powerbi_revenue_cost_drivers.png" alt="Revenue & Cost Drivers">
      </section>
      <section class="page">
        <h2>Headcount & Capacity</h2>
        <img src="../screenshots/powerbi_mockup/03_powerbi_headcount_capacity.png" alt="Headcount & Capacity">
      </section>
      <section class="page">
        <h2>Cash & Forecast Accuracy</h2>
        <img src="../screenshots/powerbi_mockup/04_powerbi_cash_accuracy.png" alt="Cash & Forecast Accuracy">

      <section class="page">
        <h2>Detail & Exceptions</h2>

</html>
