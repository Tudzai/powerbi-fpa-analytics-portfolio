<!doctype html><html><head><meta charset='utf-8'><title>SaaS CFO Metrics Dashboard</title><style>

b></div></div></section></main></div><script>document.querySelectorAll('button').forEach(b=>b.onclick=()=>{document.querySelectorAll('button,.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')})</script></body></html>
