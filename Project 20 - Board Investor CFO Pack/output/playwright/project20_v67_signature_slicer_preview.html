<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Project 20 v67 signature slicer QA</title>
  <style>
    :root {
      --bg: #463793;
      --rail: #250642;
      --surface: #351057;
      --control: #F0EAF7;
      --ink: #211A32;
      --muted: #BDAFD8;
      --rule: #8E73E7;
      --blue: #6E8EF2;
      --violet: #7047D9;
      --teal: #5FA79D;
      --amber: #BE7C10;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 230px;
      height: 720px;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
    }
    .sidebar {
      position: absolute;
      left: 14px;
      top: 8px;
      width: 176px;
      height: 700px;
      background: var(--rail);
    }
    .logo {
      position: absolute;
      left: 28px;
      top: 18px;
      width: 58px;
      height: 52px;
      border-radius: 11px;
      background: #1B0A30;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }
    .logo::before {
      content: "";
      position: absolute;
      left: 11px;
      bottom: 9px;
      width: 34px;
      height: 3.5px;
      border-radius: 2px;
      background: #6EE4CF;
    }
    .logo::after {
      content: "";
      position: absolute;
      right: 9px;
      bottom: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #E9BF72;
    }
    .brand {
      position: absolute;
      left: 96px;
      top: 29px;
      width: 78px;
      height: 46px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      color: #F8FBFF;
      font-size: 10.8px;
      font-weight: 700;
    }
    .filter-surface {
      position: absolute;
      left: 22px;
      top: 226px;
      width: 168px;
      height: 340px;
      border-radius: 7px;
      background: var(--surface);
    }
    .section-title {
      position: absolute;
      left: 34px;
      width: 134px;
      height: 30px;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 700;
      display: flex;
      align-items: center;
    }
    .rule {
      position: absolute;
      left: 34px;
      width: 148px;
      height: 2px;
      border-radius: 1px;
      background: var(--rule);
    }
    .dot {
      position: absolute;
      left: 34px;
      width: 7px;
      height: 7px;
      border-radius: 2px;
    }
    .label {
      position: absolute;
      left: 50px;
      width: 128px;
      height: 30px;
      color: #EFE7FF;
      font-size: 9.6px;
      font-weight: 700;
      display: flex;
      align-items: center;
    }
    .select {
      position: absolute;
      left: 32px;
      width: 150px;
      height: 40px;
      border-radius: 7px;
      background: var(--control);
      color: var(--ink);
      border: 1px solid #D5CDE6;
      display: grid;
      grid-template-columns: 1fr 26px;
      align-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.28);
      font-size: 14px;
    }
    .select span {
      text-align: center;
      line-height: 40px;
      padding-left: 6px;
      white-space: nowrap;
    }
    .chev {
      width: 8px;
      height: 8px;
      border-right: 1.5px solid #211A32;
      border-bottom: 1.5px solid #211A32;
      transform: rotate(45deg);
      justify-self: center;
      margin-top: -4px;
    }
    .lens {
      position: absolute;
      left: 24px;
      top: 570px;
      width: 164px;
      height: 62px;
      display: grid;
      place-items: center;
    }
    .lens-card {
      width: 154px;
      height: 52px;
      border: 1px solid var(--rule);
      border-radius: 7px;
      background: #3F1A63;
      padding: 8px 10px 6px;
      position: relative;
    }
    .lens-card::after {
      content: "";
      position: absolute;
      right: 13px;
      top: 10px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6EE4CF;
    }
    .lens-title { color: #CFC3E6; font-weight: 700; font-size: 9.5px; line-height: 10px; }
    .lens-main { color: #fff; font-weight: 700; font-size: 10.5px; line-height: 15px; margin-top: 4px; }
    .lens-sub { color: #CFC3E6; font-size: 8.7px; line-height: 10px; }
  </style>
</head>
<body>
  <div class="sidebar"></div>
  <div class="logo">FC</div>
  <div class="brand"><span>Finance</span><span>Control</span></div>

  <div class="filter-surface"></div>
  <div class="section-title" style="top:226px">Global Lens</div>
  <div class="rule" style="top:248px"></div>
  <div class="dot" style="top:263px;background:var(--blue)"></div>
  <div class="label" style="top:252px">Year</div>
  <div class="select" style="top:276px"><span>2026</span><i class="chev"></i></div>
  <div class="dot" style="top:331px;background:var(--violet)"></div>
  <div class="label" style="top:320px">Scenario</div>
  <div class="select" style="top:344px"><span>Base Case</span><i class="chev"></i></div>

  <div class="section-title" style="top:397px">P&amp;L Lens</div>
  <div class="rule" style="top:423px"></div>
  <div class="dot" style="top:437px;background:var(--teal)"></div>
  <div class="label" style="top:426px">Business Unit</div>
  <div class="select" style="top:450px"><span>All</span><i class="chev"></i></div>
  <div class="dot" style="top:505px;background:var(--amber)"></div>
  <div class="label" style="top:494px">Region</div>
  <div class="select" style="top:518px"><span>All</span><i class="chev"></i></div>

  <div class="lens">
    <div class="lens-card">
      <div class="lens-title">Current Lens</div>
      <div class="lens-main">2026 | Base Case</div>
      <div class="lens-sub">All BU | All Regions</div>
    </div>
  </div>
  <div class="rule" style="left:30px;top:642px;width:146px;height:3px"></div>
</body>
</html>
