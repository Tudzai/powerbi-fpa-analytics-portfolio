<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Project 20 v58 Desktop Crops</title>
  <style>
    body {
      margin: 0;
      background: #171126;
      color: #f3eefc;
      font: 14px/1.4 "Segoe UI", Arial, sans-serif;
    }
    .wrap {
      padding: 18px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }
    h1 {
      grid-column: 1 / -1;
      margin: 0 0 2px;
      font-size: 18px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #ded3f6;
    }
    .panel {
      background: #24113d;
      border: 1px solid #6c56a6;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 12px 26px rgba(0,0,0,.22);
    }
    .shot {
      background-image: url("../../qa/screenshots/project20_v58_desktop_full.jpg");
      background-repeat: no-repeat;
      background-size: 1445px 857px;
      border-radius: 6px;
      border: 1px solid #7f6eb4;
      overflow: hidden;
    }
    .sidebar {
      width: 286px;
      height: 335px;
      background-position: -88px -520px;
    }
    .overview {
      width: 100%;
      height: 310px;
      background-position: -320px -515px;
    }
    .checks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .check {
      background: #efe9fa;
      color: #251a37;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      min-height: 58px;
    }
    .check b {
      display: block;
      font-size: 18px;
      color: #4d3b8f;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Project 20 v58 Desktop Crops</h1>
    <section class="panel">
      <h2>Left Rail</h2>
      <div class="shot sidebar"></div>
    </section>
    <section class="panel">
      <h2>Header, KPI Strip, Chart/Table Branch</h2>
      <div class="shot overview"></div>
      <div class="checks">
        <div class="check"><b>3</b>target tables polished with SVG trend/signal columns</div>
        <div class="check"><b>12</b>sidebar dropdown slicers verified in PBIX</div>
        <div class="check"><b>0.0</b>forced units on runway/leverage charts</div>
        <div class="check"><b>150</b>visual containers in final layout</div>
      </div>
    </section>
  </div>
</body>
</html>
